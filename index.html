<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Generador de Paletas de Colores</title>
    
     <link rel="stylesheet" href="./css/styles.css"> 
</head>
<body>

 <header>
    <h1>Generador de Paletas Colorfly</h1>
    <p>Selecciona el tamaño deseado y haz clic en las opciones a continuación.</p>
 </header>

 <main>
    
     <section id="controls">
        <h2>Selección</h2>

 
 <label for="size">Cantidad de los Colores:</label>
 
  
  <select id="size">
    
   <option value="">Selecciona un valor</option>
    <option value="6">6 colores</option>
    <option value="8">8 colores</option>
    <option value="9">9 colores </option>
  </select>

   <label for="format">Formato deseado:</label>
   <select id="format">
     <option value="">Selecciona un formato</option>
     <option value="HSL">HSL</option>
     <option value="RGB">RGB</option>
     </select>
  
   
    <button id="generate">Generar paleta</button>
    <div id="msg-tooltip" aria-live="polite"></div>
     </section>
     
     <section id="palette">
        <h2>Colores que se han generado</h2>
        
         
         <div id="colors-container"></div>
      
     </section>

 </main>
 <script src="./js/app.js"></script>
</body>
</html>
